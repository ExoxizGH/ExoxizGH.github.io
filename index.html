<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suphakon Portfolio</title>

<style>
body {
    font-family: sans-serif;
    margin: 0;
    background: #1e1e1e;
    color: white;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 10px;
}

.gallery-item {
    position: relative;
    aspect-ratio: 1;
    cursor: pointer;
    overflow: hidden;
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.gallery-item-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 10px;
    opacity: 0;
}

.gallery-item:hover .gallery-item-overlay {
    opacity: 1;
}

.gallery-filter button {
    margin: 5px;
    padding: 6px 12px;
    cursor: pointer;
}

.gallery-filter .active {
    background: #8bc24a;
    color: black;
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.lightbox.open {
    display: flex;
}

.lightbox img {
    max-width: 90%;
    max-height: 80%;
}

.lightbox button {
    position: absolute;
    background: none;
    color: white;
    border: none;
    font-size: 30px;
    cursor: pointer;
}

#lightboxClose { top:20px; right:20px; }
#lightboxPrev { left:20px; top:50%; }
#lightboxNext { right:20px; top:50%; }

</style>
</head>

<body>

<div class="container">

<h2>Portfolio Showcase</h2>

<div class="gallery-filter">
    <button class="active" data-filter="all">All</button>
    <button data-filter="character">Character</button>
    <button data-filter="environment">Environment</button>
    <button data-filter="splash">Splash</button>
    <button data-filter="art">Art</button>
</div>

<div class="gallery-grid">

    <div class="gallery-item" data-tag="character">
        <img src="img2/SB_Character_01.png" alt="Character 1">
    </div>

    <div class="gallery-item" data-tag="environment">
        <img src="img2/SB_Character_Map.png" alt="Environment">
    </div>

    <div class="gallery-item" data-tag="splash">
        <img src="img/gallery_software_01.png" alt="Splash">
    </div>

    <div class="gallery-item" data-tag="art">
        <img src="img/gallery_art_01.png" alt="Sketch">
    </div>

</div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <button id="lightboxClose">×</button>
    <button id="lightboxPrev">‹</button>
    <img id="lightboxImg">
    <p id="lightboxCaption"></p>
    <button id="lightboxNext">›</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // FILTER
    document.querySelectorAll('.gallery-filter button').forEach(btn=>{
        btn.onclick = () => {
            document.querySelectorAll('.gallery-filter button').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');

            const filter = btn.dataset.filter;

            document.querySelectorAll('.gallery-item').forEach(item=>{
                item.style.display = (filter==='all'||item.dataset.tag===filter) ? '' : 'none';
            });
        };
    });

    const lightbox = document.getElementById('lightbox');
    const img = document.getElementById('lightboxImg');
    const caption = document.getElementById('lightboxCaption');

    let index = 0;

    function visibleItems(){
        return [...document.querySelectorAll('.gallery-item')]
            .filter(i=>i.style.display!=='none');
    }

    function open(i){
        const items = visibleItems();
        const el = items[i].querySelector('img');

        img.src = el.src;
        caption.textContent = el.alt;
        index = i;

        lightbox.classList.add('open');
    }

    document.querySelectorAll('.gallery-item').forEach(item=>{
        item.onclick = ()=>{
            const items = visibleItems();
            open(items.indexOf(item));
        };
    });

    document.getElementById('lightboxClose').onclick = ()=>lightbox.classList.remove('open');

    document.getElementById('lightboxPrev').onclick = (e)=>{
        e.stopPropagation();
        const items = visibleItems();
        index = (index-1+items.length)%items.length;
        open(index);
    };

    document.getElementById('lightboxNext').onclick = (e)=>{
        e.stopPropagation();
        const items = visibleItems();
        index = (index+1)%items.length;
        open(index);
    };

    lightbox.onclick = (e)=>{
        if(e.target===lightbox) lightbox.classList.remove('open');
    };

});
</script>

</body>
</html>
